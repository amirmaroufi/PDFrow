<!DOCTYPE html>
<html>
<head>
    <title>Test PDF Compress Post</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-mode">
    <div style="max-width: 800px; margin: 0 auto; padding: 40px 20px;">
        <h1 style="color: #fff;">Testing PDF Compress Article with CTA Button</h1>
        <a href="blog-post.html?post=5" style="color: #00f5ff; text-decoration: none; display: inline-block; margin: 20px 0; padding: 10px 20px; background: var(--card-bg); border-radius: 8px;">
            → View Full Article with Button
        </a>
        
        <div id="post-content" style="color: #fff;"></div>
    </div>

    <script src="blog-data.js"></script>
    <script>
        // Test loading post 5 with the new CTA button
        const post = getBlogPost(5);
        const container = document.getElementById('post-content');
        
        if (post) {
            // Show just the end of the article to see the button
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = post.content;
            const ctaSection = contentDiv.querySelector('.blog-cta-section');
            
            container.innerHTML = `
                <h2 style="color: #00f5ff;">✓ Article Found: ${post.title}</h2>
                <p style="margin-bottom: 30px;"><strong>Looking for the CTA button at the end...</strong></p>
                ${ctaSection ? `
                    <div style="border: 2px solid #00f5ff; padding: 20px; border-radius: 10px;">
                        <h3 style="color: #51cf66;">✓ CTA Button Found!</h3>
                        ${ctaSection.outerHTML}
                    </div>
                ` : '<p style="color: red;">❌ CTA Button not found</p>'}
                
                <div style="margin-top: 40px; padding: 20px; background: var(--card-bg); border-radius: 10px;">
                    <h3>Complete Article Content:</h3>
                    ${post.content}
                </div>
            `;
        } else {
            container.innerHTML = '<p style="color: red;">❌ Post not found</p>';
        }
    </script>
</body>
</html>
