<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form Test - PDFrow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div style="padding: 50px; text-align: center;">
        <h1>Contact Form Test</h1>
        <p>Click the buttons below to test the contact form functionality:</p>
        
        <button id="testContactBtn" style="padding: 15px 30px; margin: 10px; background: #00f5ff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">
            Test Contact Form
        </button>
        
        <br><br>
        
        <!-- Footer Contact Link Test -->
        <a href="#contact" id="footerContactLink" data-translate="footer_contact" style="color: #00f5ff; text-decoration: none; padding: 10px 20px; border: 2px solid #00f5ff; border-radius: 5px; display: inline-block;">
            Footer Contact Link Test
        </a>
    </div>

    <!-- Contact Form Modal (copied from main index.html) -->
    <div class="contact-modal" id="contactModal">
        <div class="contact-modal-overlay" id="contactOverlay"></div>
        <div class="contact-form-container">
            <div class="contact-form-header">
                <h2 data-translate="contact_form_title">How can we help you today?</h2>
                <p data-translate="contact_form_subtitle">Questions, bug reports, feature requests, or general feedback</p>
                <button class="contact-close-btn" id="contactCloseBtn">&times;</button>
            </div>
            
            <form class="contact-form" id="contact-form" action="https://formsubmit.co/contact@pdfrow.com" method="POST">
                <!-- FormSubmit Configuration -->
                <input type="hidden" name="_next" value="https://pdfrow.com">
                <input type="hidden" name="_subject" value="New Contact Form Submission - PDFrow">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_template" value="table">
                
                <!-- Honeypot for spam protection -->
                <input type="text" name="_honey" style="display:none">
                
                <div class="form-group">
                    <div class="input-container">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input 
                            type="text" 
                            class="contact-input" 
                            id="contactName"
                            name="name"
                            placeholder="Your full name" 
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <div class="email-input-container">
                        <svg class="email-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <input 
                            type="email" 
                            class="contact-email" 
                            id="contactEmail" 
                            name="email"
                            placeholder="Your email address" 
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <select class="contact-select" id="contactType" name="subject" required>
                        <option value="">Select a topic</option>
                        <option value="question">Ask a question</option>
                        <option value="bug">Report a bug</option>
                        <option value="feature">Request a feature</option>
                        <option value="feedback">General feedback</option>
                        <option value="business">Business inquiry</option>
                    </select>
                </div>

                <div class="form-group">
                    <textarea 
                        class="contact-textarea" 
                        id="contactMessage" 
                        name="message"
                        rows="6" 
                        placeholder="Tell us more details..." 
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <div class="file-upload-area">
                        <input type="file" id="contactFile" name="attachment" class="file-input" accept=".pdf,.jpg,.jpeg,.png,.txt,.doc,.docx">
                        <label for="contactFile" class="file-upload-label">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.64 16.2a2 2 0 0 1-2.83-2.83l8.49-8.49"/>
                            </svg>
                            <span>Attach a file (optional)</span>
                        </label>
                        <div class="file-name" id="fileName"></div>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="contactTerms" required>
                        <span class="checkmark"></span>
                        <span class="checkbox-text">
                            <span>I've read and accepted the</span>
                            <a href="terms-conditions.html" target="_blank" class="terms-link">Terms & Conditions</a>
                            <span>and</span>
                            <a href="privacy-policy.html" target="_blank" class="privacy-link">Privacy Policy</a>.
                        </span>
                    </label>
                </div>

                <button type="submit" class="contact-submit-btn">Send Message</button>
            </form>

            <div class="contact-footer">
                <p>All your information will be treated confidentially</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize the contact form when page loads
        document.addEventListener('DOMContentLoaded', function() {
            // Create an instance of the PDFrowConverter to initialize contact form
            const pdfrowConverter = new PDFrowConverter();
            
            // Add test button functionality
            document.getElementById('testContactBtn').addEventListener('click', function() {
                console.log('Test button clicked');
                pdfrowConverter.openContactForm();
            });
        });
    </script>
</body>
</html>
