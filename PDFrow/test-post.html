<!DOCTYPE html>
<html>
<head>
    <title>Test Post 5</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-mode">
    <div style="max-width: 800px; margin: 0 auto; padding: 40px 20px;">
        <h1 style="color: #fff;">Testing Blog Post #5</h1>
        <div id="post-content" style="color: #fff;"></div>
    </div>

    <script src="blog-data.js"></script>
    <script>
        // Test loading post 5
        const post = getBlogPost(5);
        const container = document.getElementById('post-content');
        
        if (post) {
            container.innerHTML = `
                <h2 style="color: #00f5ff;">✓ Post Found: ${post.title}</h2>
                <p><strong>Category:</strong> ${post.category}</p>
                <p><strong>Date:</strong> ${post.date}</p>
                <p><strong>Excerpt:</strong> ${post.excerpt}</p>
                <div style="margin-top: 30px; padding: 20px; background: #1e1f2b; border-radius: 10px;">
                    ${post.content}
                </div>
            `;
        } else {
            container.innerHTML = '<p style="color: red;">❌ Post not found</p>';
        }
    </script>
</body>
</html>
