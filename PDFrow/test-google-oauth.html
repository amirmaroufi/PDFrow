<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google OAuth Test - PDFrow</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <style>
        .test-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }
        .test-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .test-button {
            width: 100%;
            margin: 1rem 0;
        }
        .user-info {
            background: rgba(0, 245, 255, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            border-left: 4px solid var(--accent-primary);
        }
        .debug-info {
            background: var(--secondary-bg);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            font-family: monospace;
            font-size: 0.875rem;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="dark-mode">
    <div class="container">
        <div class="test-container">
            <div class="test-header">
                <h1>🔐 Google OAuth Test</h1>
                <p>Test your Google OAuth integration with Supabase</p>
            </div>

            <div id="auth-section">
                <button class="google-auth-btn test-button" id="testGoogleAuth">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Test Google Sign In
                </button>

                <button class="auth-submit-btn test-button" id="testSignOut" style="display: none; background: #f44336;">
                    Sign Out
                </button>
            </div>

            <div id="user-info" class="user-info" style="display: none;">
                <h3>✅ Signed In Successfully!</h3>
                <p><strong>Email:</strong> <span id="userEmail"></span></p>
                <p><strong>Name:</strong> <span id="userName"></span></p>
                <p><strong>Provider:</strong> <span id="userProvider"></span></p>
                <p><strong>Profile Picture:</strong> <span id="userAvatar"></span></p>
                <p><strong>Email Verified:</strong> <span id="emailVerified"></span></p>
            </div>

            <div class="debug-info">
                <strong>Debug Console:</strong>
                <div id="debugLog">Initializing Google OAuth test...</div>
            </div>

            <div style="text-align: center; margin-top: 2rem;">
                <a href="index.html" class="btn-auth btn-login">← Back to Main Site</a>
            </div>
        </div>
    </div>

    <!-- Supabase and Auth Scripts -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <script>
        let currentUser = null;
        const debugLog = document.getElementById('debugLog');
        
        function log(message) {
            console.log(message);
            debugLog.textContent += '\n' + new Date().toLocaleTimeString() + ': ' + message;
            debugLog.scrollTop = debugLog.scrollHeight;
        }

        async function initTest() {
            try {
                log('Checking Supabase client...');
                
                if (!window.supabaseClient) {
                    log('❌ Supabase client not available');
                    return;
                }
                
                log('✅ Supabase client available');
                
                // Check current session
                const { data: { session }, error } = await window.supabaseClient.auth.getSession();
                
                if (error) {
                    log('❌ Error getting session: ' + error.message);
                    return;
                }
                
                if (session) {
                    log('✅ Existing session found');
                    currentUser = session.user;
                    updateUI();
                } else {
                    log('ℹ️ No existing session');
                }
                
                // Listen for auth changes
                window.supabaseClient.auth.onAuthStateChange((event, session) => {
                    log(`🔄 Auth state changed: ${event}`);
                    currentUser = session?.user || null;
                    updateUI();
                    
                    if (event === 'SIGNED_IN' && session) {
                        log('✅ Successfully signed in with Google!');
                        log('User data: ' + JSON.stringify(session.user, null, 2));
                    }
                });
                
                log('✅ Test initialized successfully');
                
            } catch (error) {
                log('❌ Error initializing test: ' + error.message);
            }
        }

        function updateUI() {
            const authSection = document.getElementById('auth-section');
            const userInfo = document.getElementById('user-info');
            const testGoogleAuth = document.getElementById('testGoogleAuth');
            const testSignOut = document.getElementById('testSignOut');
            
            if (currentUser) {
                // User is signed in
                testGoogleAuth.style.display = 'none';
                testSignOut.style.display = 'block';
                userInfo.style.display = 'block';
                
                // Populate user info
                document.getElementById('userEmail').textContent = currentUser.email || 'N/A';
                document.getElementById('userName').textContent = currentUser.user_metadata?.full_name || 'N/A';
                document.getElementById('userProvider').textContent = currentUser.app_metadata?.provider || 'N/A';
                document.getElementById('emailVerified').textContent = currentUser.email_confirmed_at ? 'Yes' : 'No';
                
                const avatarSpan = document.getElementById('userAvatar');
                const avatarUrl = currentUser.user_metadata?.avatar_url || currentUser.user_metadata?.picture;
                if (avatarUrl) {
                    avatarSpan.innerHTML = `<img src="${avatarUrl}" alt="Profile" style="width: 32px; height: 32px; border-radius: 50%; vertical-align: middle;">`;
                } else {
                    avatarSpan.textContent = 'N/A';
                }
                
            } else {
                // User is not signed in
                testGoogleAuth.style.display = 'block';
                testSignOut.style.display = 'none';
                userInfo.style.display = 'none';
            }
        }

        // Test Google OAuth
        document.getElementById('testGoogleAuth').addEventListener('click', async () => {
            try {
                log('🔄 Starting Google OAuth test...');
                
                const { data, error } = await window.supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.href,
                        queryParams: {
                            access_type: 'offline',
                            prompt: 'consent',
                        }
                    }
                });

                if (error) {
                    log('❌ Google OAuth error: ' + error.message);
                    return;
                }
                
                log('🔄 Redirecting to Google...');
                
            } catch (error) {
                log('❌ Error during Google OAuth: ' + error.message);
            }
        });

        // Test sign out
        document.getElementById('testSignOut').addEventListener('click', async () => {
            try {
                log('🔄 Signing out...');
                
                const { error } = await window.supabaseClient.auth.signOut();
                
                if (error) {
                    log('❌ Sign out error: ' + error.message);
                    return;
                }
                
                log('✅ Signed out successfully');
                
            } catch (error) {
                log('❌ Error during sign out: ' + error.message);
            }
        });

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initTest);
    </script>
</body>
</html>
